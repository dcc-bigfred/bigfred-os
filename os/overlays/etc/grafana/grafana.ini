# BigFred hub — minimal Grafana overrides (defaults in /usr/share/grafana/conf/defaults.ini)

[paths]
data = /data/opt/grafana/data
logs = /data/opt/grafana/log
plugins = /data/opt/grafana/plugins
provisioning = /etc/grafana/provisioning

[server]
protocol = http
http_addr =
http_port = 3000

[security]
admin_user = admin
admin_password = bigfred

[analytics]
reporting_enabled = false
check_for_updates = false
