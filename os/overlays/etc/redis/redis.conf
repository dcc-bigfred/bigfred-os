# Default Redis config for BigFred hub. Copied to /data/etc/redis.conf on
# first boot (S10-mount) or first redis start (S30-redis). Edit the copy
# under /data to tune persistence without touching the read-only rootfs.

bind 127.0.0.1
port 6379
daemonize no
supervised no
dir /data/redis
dbfilename dump.rdb

# RDB only — limit disk writes vs AOF; snapshot when >=100 changes in 60s.
appendonly no
save 60 100

logfile /data/logs/redis/redis.log
notify-keyspace-events "KA"
