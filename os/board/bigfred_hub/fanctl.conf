# fanctl — Raspberry Pi 5 active cooler (hub spec §8.8)
# Edit on the device under /data/etc/ (persists across image updates).

COOLDOWN=300
INTERVAL=5

# Optional sysfs overrides (defaults work on Raspberry Pi 5):
# FAN_PWM=/sys/class/thermal/cooling_device0/cur_state
# FAN_MAX=/sys/class/thermal/cooling_device0/max_state
# THERM=/sys/class/thermal/thermal_zone0/temp
