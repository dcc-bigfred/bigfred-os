name: Release apps

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    name: Publish bigfred-os-ui binary
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24.0"
          cache: true

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: apps/bigfred-os-ui/web/package-lock.json

      - name: Build web + linux/arm64 binary
        run: |
          set -euo pipefail
          mkdir -p dist
          make -C apps/bigfred-os-ui web-build
          # Portable static binary for musl hubs (no PAM; use USERNAME/PASSWORD in conf if needed).
          cd "$(pwd)"
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -tags '!pam' -ldflags='-s -w' \
            -o dist/bigfred-os-ui-linux-arm64 ./apps/bigfred-os-ui

      - name: Create release if missing
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes
          else
            echo "Release ${TAG} already exists"
          fi

      - name: Upload binaries to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          gh release upload "$TAG" dist/bigfred-os-ui-linux-arm64 --clobber
